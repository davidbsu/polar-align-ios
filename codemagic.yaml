workflows:
  ios-unsigned-build:
    name: PolarAlign iOS Unsigned Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    cache:
      cache_paths:
        - $CM_BUILD_DIR/node_modules

    environment:
      vars:
        IOS_PROJECT: "ios/App/App.xcodeproj"
        IOS_SCHEME: "App"

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Capacitor sync
        script: |
          chmod -R 755 node_modules/.bin/
          npx cap sync ios

      - name: Build .app (no signing)
        script: |
          xcodebuild build \
            -project "$CM_BUILD_DIR/$IOS_PROJECT" \
            -scheme "$IOS_SCHEME" \
            -sdk iphoneos \
            -configuration Debug \
            -derivedDataPath "$CM_BUILD_DIR/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE=""

      - name: Create .ipa
        script: |
          APP_PATH=$(find "$CM_BUILD_DIR/DerivedData" -name "*.app" -not -path "*/simulator/*" | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p "$CM_BUILD_DIR/Payload"
          cp -r "$APP_PATH" "$CM_BUILD_DIR/Payload/"
          cd "$CM_BUILD_DIR"
          zip -r "PolarAlign.ipa" Payload/
          mkdir -p "$CM_BUILD_DIR/build/ios/ipa"
          mv "$CM_BUILD_DIR/PolarAlign.ipa" "$CM_BUILD_DIR/build/ios/ipa/PolarAlign-unsigned.ipa"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
