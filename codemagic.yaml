workflows:
  ios-unsigned-build:
    name: PolarAlign iOS Unsigned Build
    instance_type: mac_mini_m2
    cache:
      cache_paths:
        - $CM_BUILD_DIR/node_modules
        - $HOME/Library/Caches/CocoaPods

    environment:
      vars:
        IOS_PROJECT: "ios/App/App.xcodeproj"
        IOS_SCHEME: "App"

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Capacitor sync
        script: |
          chmod -R 755 node_modules/.bin/
          npx cap sync ios

      - name: Create ExportOptions.plist
        script: |
          cat > ios/App/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: List available SDKs
        script: xcodebuild -showsdks

      - name: Build IPA (ad-hoc signed)
        script: |
          xcodebuild archive \
            -project "$CM_BUILD_DIR/$IOS_PROJECT" \
            -scheme "$IOS_SCHEME" \
            -sdk iphoneos18.4 \
            -configuration Debug \
            -archivePath "$CM_BUILD_DIR/PolarAlign.xcarchive" \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            EXPANDED_CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            IPHONEOS_DEPLOYMENT_TARGET=14.0

      - name: Copy .app to Payload folder
        script: |
          mkdir -p "$CM_BUILD_DIR/Payload"
          APP_PATH=$(find "$CM_BUILD_DIR/PolarAlign.xcarchive/Products/Applications" -name "*.app" | head -1)
          cp -r "$APP_PATH" "$CM_BUILD_DIR/Payload/"

      - name: Create unsigned .ipa
        script: |
          cd "$CM_BUILD_DIR"
          zip -r "PolarAlign.ipa" Payload/

      - name: Move .ipa to artifacts folder
        script: |
          mkdir -p "$CM_BUILD_DIR/build/ios/ipa"
          mv "$CM_BUILD_DIR/PolarAlign.ipa" "$CM_BUILD_DIR/build/ios/ipa/PolarAlign-unsigned.ipa"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
