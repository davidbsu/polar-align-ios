workflows:
  ios-unsigned-build:
    name: PolarAlign iOS Unsigned Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    cache:
      cache_paths:
        - $CM_BUILD_DIR/node_modules
        - $HOME/Library/Caches/CocoaPods

    environment:
      xcode: "16.3"
      vars:
        IOS_PROJECT: "ios/App/App.xcodeproj"
        IOS_SCHEME: "App"

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Capacitor sync
        script: |
          chmod -R 755 node_modules/.bin/
          npx cap sync ios

      - name: Create ExportOptions.plist
        script: |
          cat > ios/App/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Build .app (no archive, no signing)
        script: |
          xcodebuild build \
            -project "$CM_BUILD_DIR/$IOS_PROJECT" \
            -scheme "$IOS_SCHEME" \
            -sdk iphoneos \
            -configuration Debug \
            -derivedDataPath "$CM_BUILD_DIR/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE=""

      - name: Install ldid
        script: |
          brew install ldid

      - name: Sign .app with ldid
        script: |
          APP_PATH=$(find "$CM_BUILD_DIR/DerivedData" -name "*.app" -not -path "*/simulator/*" | head -1)
          echo "Found app at: $APP_PATH"
          ldid -S "$APP_PATH"

      - name: Create .ipa
        script: |
          APP_PATH=$(find "$CM_BUILD_DIR/DerivedData" -name "*.app" -not -path "*/simulator/*" | head -1)
          mkdir -p "$CM_BUILD_DIR/Payload"
          cp -r "$APP_PATH" "$CM_BUILD_DIR/Payload/"
          cd "$CM_BUILD_DIR"
          zip -r "PolarAlign.ipa" Payload/
          mkdir -p "$CM_BUILD_DIR/build/ios/ipa"
          mv "$CM_BUILD_DIR/PolarAlign.ipa" "$CM_BUILD_DIR/build/ios/ipa/PolarAlign-unsigned.ipa"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
